name: Publish CRD Charts

on:
  push:
    paths: ['charts/*/crdctl.yaml']
    branches: [master]

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          # devbox.lock in the key: the go-build cache holds artifacts
          # linked against nix store paths — a toolchain bump with a stale
          # restored cache yields "fork/exec ...: no such file" in go test.
          key: go-${{ runner.os }}-${{ hashFiles('devbox.lock') }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-${{ hashFiles('devbox.lock') }}-

      - name: Install devbox
        run: curl -fsSL https://get.jetify.com/devbox | bash -s -- -f

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | devbox run -- helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and publish all CRD charts
        run: devbox run -- just crd-publish-all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
