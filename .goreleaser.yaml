project_name: ocictl

version: 2

builds:
  - id: helmctl
    main: ./cmd/helmctl
    binary: helmctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: crdctl
    main: ./cmd/crdctl
    binary: crdctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: helmctl
    ids:
      - helmctl
    formats: [tar.gz]
    name_template: "helmctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: crdctl
    ids:
      - crdctl
    formats: [tar.gz]
    name_template: "crdctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  github:
    owner: truvity
    name: ocictl
  header: |
    ## ocictl {{ .Tag }}

    ### Install

    ```bash
    # Via go run (no install needed):
    go run github.com/truvity/ocictl/cmd/helmctl@{{ .Tag }} --help
    go run github.com/truvity/ocictl/cmd/crdctl@{{ .Tag }} --help
    ```

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
